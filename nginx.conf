server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs: /planet/hd-189733-b -> /planet/hd-189733-b.html
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Long-cache immutable static assets (vendored libs, css, js).
    location /static/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # .ase palette downloads.
    location /palettes/ {
        types { } default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    location = /404.html { internal; }
}
